name: Deploy Flutter Web

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pobranie pakietów
        run: flutter pub get

      - name: Budowanie aplikacji
        run: flutter build web --release --base-href /pasieka_app/

      - name: Upload artefaktu
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Publikacja
        uses: actions/deploy-pages@v4